version: "2"

run:
  timeout: 90m
  concurrency: 1

output:
  formats:
    text:
      colors: true
      print-linter-name: true
  show-stats: true

formatters:
  enable:
    - goimports
    - gofmt
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/upbound/provider-gcp/v2

linters:
  default: none
  enable:
    # explicitly enabled
    - govet
    - gocyclo
    - gocritic
    - goconst
    - revive
    - staticcheck
    - unconvert
    - misspell
    - nakedret
    # v1 "bugs" preset
    - asasalint
    - asciicheck
    - bodyclose
    - contextcheck
    - durationcheck
    - errcheck
    - errchkjson
    - errorlint
    - exhaustive
    - gosec
    - gosmopolitan
    - loggercheck
    - makezero
    - musttag
    - nilerr
    - nilnesserr
    - noctx
    - protogetter
    - reassign
    - recvcheck
    - rowserrcheck
    - spancheck
    - testifylint
    - zerologlint
    # v1 "unused" preset
    - ineffassign
    - unparam
    - unused

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - io/ioutil.ReadFile
        - io/ioutil.ReadDir
        - io/ioutil.ReadAll

    govet:
      disable:
        - shadow

    revive:
      confidence: 0.8

    gocyclo:
      min-complexity: 10

    dupl:
      threshold: 100

    goconst:
      min-len: 3
      min-occurrences: 5

    lll:
      tab-width: 1

    unparam:
      check-exported: false

    nakedret:
      max-func-lines: 30

    gocritic:
      enabled-tags:
        - performance
      settings:
        captLocal:
          paramsOnly: true
        rangeValCopy:
          sizeThreshold: 32

  exclusions:
    generated: lax
    rules:
      - path: _test(ing)?\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - unparam

      - path: _test\.go
        text: "(unnamedResult|exitAfterDefer)"
        linters:
          - gocritic

      - text: "(hugeParam|rangeValCopy):"
        linters:
          - gocritic

      - text: "SA3000:"
        linters:
          - staticcheck

      - text: "QF1008:"
        linters:
          - staticcheck

      - text: "G101:"
        linters:
          - gosec

      - text: "G104:"
        linters:
          - gosec

issues:
  new: false
  max-issues-per-linter: 0
  max-same-issues: 0
